{% extends 'base.html' %}

{% block title %}Add Server - ServerCrown{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold mb-6">Add Server</h1>

    <form method="post" hx-post="{% url 'server_add' %}" hx-target="#result" class="space-y-4">
        {% csrf_token %}

        <div>
            <label class="block text-sm text-gray-400 mb-1">Name</label>
            <input type="text" name="name" required
                   class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 focus:border-crown-500 focus:outline-none">
        </div>

        <div>
            <label class="block text-sm text-gray-400 mb-1">Tags</label>
            <input type="text" name="tags"
                   class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 focus:border-crown-500 focus:outline-none"
                   placeholder="production, web, eu-west">
        </div>

        <div>
            <label class="block text-sm text-gray-400 mb-1">Notes</label>
            <textarea name="notes" rows="3"
                      class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-gray-100 focus:border-crown-500 focus:outline-none"
                      placeholder="Optional notes about this server"></textarea>
        </div>

        <button type="submit"
                class="w-full bg-crown-500 hover:bg-crown-600 text-gray-900 font-medium px-4 py-2 rounded-lg transition">
            Create Server
        </button>
    </form>

    <div id="result" class="mt-6"></div>
</div>
{% endblock %}
