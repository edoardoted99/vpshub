<!-- Add note form -->
<form hx-post="{% url 'note_add' server.pk %}" hx-target="#notes-section" hx-swap="innerHTML" class="flex gap-2 mb-4">
    {% csrf_token %}
    <input type="text" name="text" placeholder="Add a note..." required
           class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-100 focus:border-crown-500 focus:outline-none">
    <button type="submit"
            class="bg-crown-500 hover:bg-crown-600 text-gray-900 font-medium px-4 py-2 rounded-lg text-sm transition">
        Add
    </button>
</form>

<!-- Notes list -->
{% if notes %}
<div class="space-y-2">
    {% for note in notes %}
    <div class="flex items-start justify-between gap-3 bg-gray-800 rounded-lg px-4 py-3">
        <div class="flex-1 min-w-0">
            <p class="text-sm text-gray-300 whitespace-pre-wrap">{{ note.text }}</p>
            <p class="text-xs text-gray-600 mt-1">{{ note.created_at|timesince }} ago</p>
        </div>
        <form hx-post="{% url 'note_delete' note.pk %}" hx-target="#notes-section" hx-swap="innerHTML" hx-confirm="Delete this note?">
            {% csrf_token %}
            <button class="text-gray-600 hover:text-red-400 text-sm transition shrink-0">&times;</button>
        </form>
    </div>
    {% endfor %}
</div>
{% else %}
<p class="text-sm text-gray-600">No notes yet.</p>
{% endif %}
