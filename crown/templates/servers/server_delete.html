{% extends 'base.html' %}

{% block title %}Delete {{ server.name }} - ServerCrown{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold mb-4">Delete Server</h1>
    <p class="text-gray-400 mb-6">Are you sure you want to delete <strong class="text-gray-100">{{ server.name }}</strong>? This cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <div class="flex gap-3">
            <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-medium px-4 py-2 rounded-lg transition">
                Delete
            </button>
            <a href="{% url 'server_detail' server.pk %}" class="bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium px-4 py-2 rounded-lg transition">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
